name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python package (editable, dev extras)
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint, test, typecheck (Turborepo)
        run: npx turbo run lint test typecheck
